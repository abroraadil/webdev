            <h2>Join Alumni Mailing List</h2>
            <h3>Request Alumni Newsletter</h3>
            <p>Required information is marked with an asterisk (*).</p>
            <form action="https://kearl.net/se1400/mail.php" method="post">
                <label for="myFNname">* First Name:</label>
                <input type="text" id="myFNname" name="myFNname" required>
                <label for="myLNname">* Last Name:</label>
                <input type="text" id="myLNname" name="myLNname" required>
                <label for="myEmail">* Email:</label>
                <input type="email" id="myEmail" name="myEmail" required>
                <label for="myPhone">Phone:</label>
                <input type="tel" id="myPhone" name="myPhone">
                <label for="calendarfield">Graduation Date</label>
                <input type="date" id="calendarfield" name="calendarfield">
                <label for="myComments"> * Comments:</label>
                <textarea id="myComments" name="myComments" rows="2" cols="20"></textarea><br>
                <input type="submit" value="Submit" required>
            </form>
